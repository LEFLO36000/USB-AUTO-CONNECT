<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { margin: 0; background-color: #1a1b26; font-family: sans-serif; color: #ffffff; }
        #main-container { width: 100%; height: 100vh; }
        #dashboard-frame { width: 100%; height: 100%; border: none; }
        
        /* Το κεντρικό μήνυμα για το OFFLINE */
        #offline-message { 
            display: none; 
            text-align: center; 
            padding-top: 100px; 
            font-size: 32px; 
            color: #f7768e; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="offline-message">VM OFFLINE</div>
    <iframe id="dashboard-frame" src="http://100.127.249.63:8080"></iframe>

    <script>
        const frame = document.getElementById('dashboard-frame');
        const offlineMsg = document.getElementById('offline-message');
        const TARGET_URL = 'http://100.127.249.63:8080';

        async function updateStatus() {
            try {
                // Προσπάθεια σύνδεσης στον server
                await fetch(TARGET_URL, { mode: 'no-cors' });
                
                // Αν πετύχει, δείχνουμε τον server
                frame.style.display = 'block';
                offlineMsg.style.display = 'none';
            } catch (error) {
                // Αν αποτύχει, δείχνουμε VM OFFLINE
                frame.style.display = 'none';
                offlineMsg.style.display = 'block';
            }
        }

        // Έλεγχος κάθε 1 δευτερόλεπτο
        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
</body>
</html>
