<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB Auto-Connect</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%; width: 100%; overflow: hidden; background: #0f172a;
        }
        #offline {
            height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: #f87171; font-family: system-ui;
        }
        #offline h1 { font-size: 6rem; font-weight: 900; }
        iframe {
            width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>

    <!-- OFFLINE SCREEN -->
    <div id="offline">
        <h1>VM OFFLINE</h1>
        <p style="font-size:1.5rem; margin-top:20px;">Ο server δεν είναι προσβάσιμος</p>
        <button onclick="checkAndLoad()" 
                style="margin-top:40px; padding:15px 40px; font-size:1.2rem; background:#334155; color:white; border:none; border-radius:12px; cursor:pointer;">
            Δοκίμασε Ξανά
        </button>
    </div>

    <!-- SERVER DASHBOARD -->
    <iframe id="serverFrame" style="display:none;" allowfullscreen></iframe>

    <script>
        const SERVER_URL = "http://100.127.249.63:8080"; 
        
        async function checkAndLoad() {
            const offline = document.getElementById('offline');
            const frame = document.getElementById('serverFrame');
            
            try {
                // Stronger check
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);
                
                await fetch(SERVER_URL, { 
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal,
                    cache: 'no-store'
                });
                clearTimeout(timeout);
                
                // ONLINE
                offline.style.display = 'none';
                frame.src = SERVER_URL + "?t=" + Date.now();  // Prevent cache
                frame.style.display = 'block';
                
            } catch (err) {
                // OFFLINE
                offline.style.display = 'flex';
                frame.style.display = 'none';
                frame.src = '';   // Clear iframe completely
            }
        }

        // Auto refresh every 7 seconds
        setInterval(checkAndLoad, 7000);

        // Initial load
        window.onload = checkAndLoad;
    </script>
</body>
</html>
