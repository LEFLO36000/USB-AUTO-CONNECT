<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1b26; }
        
        #server-frame { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            border: none; display: none; 
        }

        #offline-msg { 
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh;
            color: #f7768e; font-family: monospace; font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="offline-msg">VM OFFLINE</div>
    <iframe id="server-frame" src="http://YOUR_TAILSCALE_IP:8080"></iframe>

    <script>
        const frame = document.getElementById('server-frame');
        const msg = document.getElementById('offline-msg');
        const TARGET = 'http://100.127.249.63:8080';

        async function update() {
            try {
                // We fetch the server to check if it's alive
                await fetch(TARGET, { mode: 'no-cors' });
                // If we get here, it's alive
                frame.style.display = 'block';
                msg.style.display = 'none';
            } catch (e) {
                // If it fails, show OFFLINE
                frame.style.display = 'none';
                msg.style.display = 'flex';
            }
        }

        // Check every 1 second
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
