<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>USB Auto-Connect</title>
    <style>
    /* Μηδενίζουμε τα περιθώρια του browser */
    html, body { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        background-color: #1a1b26; 
        overflow: hidden; /* Για να μην εμφανίζονται μπάρες κύλισης */
    }

    /* Αναγκάζουμε το iframe να πιάσει όλο τον χώρο */
    #server-frame { 
        width: 100vw; 
        height: 100vh; 
        border: none; 
        display: block; 
    }

    /* Το μήνυμα "VM OFFLINE" στο κέντρο */
    #error-msg { 
        display: none; 
        color: #f7768e; 
        font-family: sans-serif; 
        font-size: 24px; 
        text-align: center; 
        padding-top: 20%; 
    }
</style>
</head>
<body>

    <div id="offline-message">VM OFFLINE</div>
    <iframe id="dashboard-frame" src="http://100.127.249.63:8080"></iframe>

    <script>
        const frame = document.getElementById('dashboard-frame');
        const offlineMsg = document.getElementById('offline-message');
        const TARGET_URL = 'http://100.127.249.63:8080';

        async function updateStatus() {
            try {
                // Προσπάθεια σύνδεσης στον server
                await fetch(TARGET_URL, { mode: 'no-cors' });
                
                // Αν πετύχει, δείχνουμε τον server
                frame.style.display = 'block';
                offlineMsg.style.display = 'none';
            } catch (error) {
                // Αν αποτύχει, δείχνουμε VM OFFLINE
                frame.style.display = 'none';
                offlineMsg.style.display = 'block';
            }
        }

        // Έλεγχος κάθε 1 δευτερόλεπτο
        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
</body>
</html>
